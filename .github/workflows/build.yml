name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.2-bin.zip -d /opt
          /opt/gradle-8.2/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | head -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConnectFour-APK
          path: app/build/outputs/apk/debug/app-debug.apk
