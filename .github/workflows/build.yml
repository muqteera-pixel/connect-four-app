name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Recreate all resource XML files cleanly
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat > app/src/main/res/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Connect Four</string>
          </resources>
          XMLEOF

          cat > app/src/main/res/values/themes.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ConnectFour" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#071418</item>
                  <item name="android:statusBarColor">#071418</item>
                  <item name="android:navigationBarColor">#071418</item>
              </style>
              <style name="Theme.ConnectFour.Splash" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#071418</item>
                  <item name="android:statusBarColor">#071418</item>
                  <item name="android:navigationBarColor">#071418</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          XMLEOF

          cat > app/src/main/res/layout/activity_main.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#071418">
              <WebView
                  android:id="@+id/webView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </RelativeLayout>
          XMLEOF

          cat > app/src/main/res/layout/activity_splash.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#071418">
              <ImageView
                  android:id="@+id/splash_icon"
                  android:layout_width="140dp"
                  android:layout_height="140dp"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="180dp"
                  android:src="@drawable/ic_launcher_foreground"
                  android:scaleType="fitCenter" />
              <TextView
                  android:id="@+id/splash_title"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/splash_icon"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="24dp"
                  android:text="CONNECT FOUR"
                  android:textColor="#c9a227"
                  android:textSize="32sp"
                  android:textStyle="bold" />
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/splash_title"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="8dp"
                  android:text="Drop it. Connect it. Win it."
                  android:textColor="#4a7a8a"
                  android:textSize="13sp" />
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_alignParentBottom="true"
                  android:layout_centerHorizontal="true"
                  android:layout_marginBottom="48dp"
                  android:text="Loading..."
                  android:textColor="#1a4a5a"
                  android:textSize="12sp" />
          </RelativeLayout>
          XMLEOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#071418" />
          </shape>
          XMLEOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#071418" android:pathData="M0,0h108v108h-108z" />
              <path android:fillColor="#0d2028" android:pathData="M18,18m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M34,18m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M50,18m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M66,18m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M82,18m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M18,34m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M34,34m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M50,34m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M66,34m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#0d2028" android:pathData="M82,34m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#ef4444" android:pathData="M18,66m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#ef4444" android:pathData="M34,66m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#ef4444" android:pathData="M50,66m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#ef4444" android:pathData="M66,66m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#f59e0b" android:pathData="M18,82m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#f59e0b" android:pathData="M34,82m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#f59e0b" android:pathData="M50,50m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#f59e0b" android:pathData="M66,50m-7,0a7,7 0,1 1,14 0a7,7 0,1 1,-14 0" />
              <path android:fillColor="#fca5a5" android:pathData="M15,63m-2,0a2,2 0,1 1,4 0a2,2 0,1 1,-4 0" />
              <path android:fillColor="#fca5a5" android:pathData="M31,63m-2,0a2,2 0,1 1,4 0a2,2 0,1 1,-4 0" />
          </vector>
          XMLEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          XMLEOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          XMLEOF

          cat > app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourname.connectfour">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ConnectFour"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true">
                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="ca-app-pub-3702571447385802~2254819438" />
                  <activity
                      android:name=".SplashActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:theme="@style/Theme.ConnectFour.Splash">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity
                      android:name=".MainActivity"
                      android:exported="false"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize"
                      android:theme="@style/Theme.ConnectFour" />
              </application>
          </manifest>
          XMLEOF

          echo "All XML files recreated successfully"

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.2-bin.zip -d /opt
          /opt/gradle-8.2/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConnectFour-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
