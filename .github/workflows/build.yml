name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.2-bin.zip -d /opt
          /opt/gradle-8.2/bin/gradle wrapper
          chmod +x gradlew

      - name: Check all XML files
        run: |
          echo "=== Checking all XML files ==="
          find app/src/main/res -name "*.xml" | while read f; do
            echo "Checking: $f"
            xmllint --noout "$f" 2>&1 && echo "OK: $f" || echo "BROKEN: $f"
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConnectFour-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
